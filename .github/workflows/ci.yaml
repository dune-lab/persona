name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish contracts to registry
        if: github.event_name == 'push'
        run: |
          [ -f dist/contracts.json ] || exit 0
          git clone "https://x-access-token:${{ secrets.DUNE_LAB_TOKEN }}@github.com/dune-lab/contracts.git" /tmp/contracts
          cp dist/contracts.json /tmp/contracts/${{ github.event.repository.name }}/contracts.json
          cd /tmp/contracts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && echo "No contract changes" && exit 0
          git commit -m "contracts(${{ github.event.repository.name }}): update from ${{ github.sha }}"
          git push

      - name: Validate contracts
        if: github.event_name == 'pull_request'
        run: |
          git clone "https://x-access-token:${{ secrets.DUNE_LAB_TOKEN }}@github.com/dune-lab/contracts.git" /tmp/contracts
          node node_modules/@enxoval/http/dist/cli/kanly.js
        env:
          KANLY_LOCAL_DIR: /tmp/contracts
